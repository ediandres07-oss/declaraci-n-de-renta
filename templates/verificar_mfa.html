<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Verificación en dos pasos — Declaración de Renta</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,'Segoe UI',Roboto,sans-serif; color:#1e2b3a;
         background:#f0f2f5; min-height:100vh; display:flex; align-items:center;
         justify-content:center; padding:20px; }
  .caja { background:#fff; border-radius:18px; max-width:420px; width:100%; padding:38px 32px;
          box-shadow:0 18px 50px rgba(10,25,45,.15); text-align:center; }
  .logo { font-size:2.2rem; }
  h1 { color:#2d5016; font-size:1.35rem; margin:12px 0 6px; }
  p.sub { color:#5a6b7f; font-size:.9rem; margin-bottom:26px; line-height:1.5; }
  input { width:100%; padding:14px; font-size:1.5rem; text-align:center; letter-spacing:.4em;
          border:1px solid #dbe3ec; border-radius:12px; font-family:ui-monospace,monospace; }
  input:focus { outline:none; border-color:#4caf50; }
  button { width:100%; padding:13px; margin-top:14px; border:0; border-radius:12px;
           background:#2d5016; color:#fff; font-size:1rem; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .error { color:#c0392b; font-size:.88rem; margin-top:12px; min-height:1.2em; }
  .ayuda { margin-top:22px; font-size:.8rem; color:#8794a5; line-height:1.5; }
  a { color:#5a6b7f; }
</style>
</head>
<body>
  <div class="caja">
    <div class="logo">🔐</div>
    <h1>Verificación en dos pasos</h1>
    <p class="sub">Abre tu app de autenticación e ingresa el código de 6 dígitos.</p>

    <form id="form">
      <input id="codigo" inputmode="numeric" autocomplete="one-time-code"
             maxlength="9" placeholder="000000" autofocus>
      <button type="submit" id="btn">Verificar</button>
    </form>
    <div class="error" id="error"></div>

    <p class="ayuda">
      ¿Perdiste tu teléfono? Ingresa uno de tus <strong>códigos de respaldo</strong>.<br>
      <a href="/logout">Cancelar e iniciar sesión con otra cuenta</a>
    </p>
  </div>

<script>
const form = document.getElementById('form');
const campo = document.getElementById('codigo');
const btn = document.getElementById('btn');
const error = document.getElementById('error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  error.textContent = '';
  btn.disabled = true;
  try {
    const r = await fetch('/api/verificar-codigo-totp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({codigo: campo.value})
    });
    const j = await r.json();
    if (r.ok) { window.location = j.destino || '/mi-cuenta'; return; }
    error.textContent = j.error || 'No se pudo verificar el código.';
    campo.value = '';
    campo.focus();
  } catch (err) {
    error.textContent = 'Error de conexión. Intenta de nuevo.';
  }
  btn.disabled = false;
});
</script>
</body>
</html>
